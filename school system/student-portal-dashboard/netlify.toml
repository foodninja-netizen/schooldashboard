# Netlify configuration for Student Portal Dashboard

[build]
  publish = "."            # Serve the current folder (student-portal-dashboard)
  functions = "netlify/functions"

# Redirect API requests to the serverless function with the remaining path in ?path=
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api?path=:splat"
  status = 200
  force = true

# Cache static assets softly (optional)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Basic security headers (optional)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"